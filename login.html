<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập – LND Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="logo logo-link" href="index.html"><span class="leaf">🌿</span>LND <span class="brand-sub">Academy</span></a>
  <div class="nav-auth" id="navAuth"></div>
</nav>

<main class="narrow">
  <div class="card">
    <div class="card-label">Đăng nhập</div>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Mật khẩu</label>
      <input type="password" id="password" required />

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Đăng nhập</button>
    </form>
    <div class="form-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></div>
  </div>
</main>

<script src="auth.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("errorMsg");
  errEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Đang đăng nhập...";

  try {
    const res = await fetch(API_URL + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Đăng nhập thất bại");

    setSession(data.access_token, data.user);
    window.location.href = "index.html";
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Đăng nhập";
  }
});
</script>
</body>
</html>
