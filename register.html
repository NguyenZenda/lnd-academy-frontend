<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng ký – LND Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="logo logo-link" href="index.html"><span class="leaf">🌿</span>LND <span class="brand-sub">Academy</span></a>
  <div class="nav-auth" id="navAuth"></div>
</nav>

<main class="narrow">
  <div class="card">
    <div class="card-label">Tạo tài khoản</div>

    <div class="role-toggle">
      <button type="button" class="role-btn active" id="studentBtn" onclick="setRole('student')">🎓 Học sinh</button>
      <button type="button" class="role-btn" id="teacherBtn" onclick="setRole('teacher')">🧑‍🏫 Giáo viên</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registerForm">
      <label for="fullName">Họ và tên</label>
      <input type="text" id="fullName" required />

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Mật khẩu</label>
      <input type="password" id="password" minlength="6" required />

      <div id="inviteSection" style="display:none;">
        <label for="inviteCode">Mã mời giáo viên</label>
        <input type="text" id="inviteCode" />
        <div class="form-note">Liên hệ quản trị viên LND Academy để lấy mã mời dành cho giáo viên.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Đăng ký</button>
    </form>
    <div class="form-footer">Đã có tài khoản? <a href="login.html">Đăng nhập</a></div>
  </div>
</main>

<script src="auth.js"></script>
<script>
let selectedRole = "student";

function setRole(role) {
  selectedRole = role;
  document.getElementById("studentBtn").classList.toggle("active", role === "student");
  document.getElementById("teacherBtn").classList.toggle("active", role === "teacher");
  document.getElementById("inviteSection").style.display = role === "teacher" ? "block" : "none";
}

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("errorMsg");
  const okEl = document.getElementById("successMsg");
  errEl.style.display = "none";
  okEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Đang tạo tài khoản...";

  try {
    const body = {
      full_name: document.getElementById("fullName").value.trim(),
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value,
      role: selectedRole,
    };
    if (selectedRole === "teacher") {
      body.invite_code = document.getElementById("inviteCode").value.trim();
    }

    const res = await fetch(API_URL + "/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Đăng ký thất bại");

    okEl.textContent = "Đăng ký thành công! Đang chuyển đến trang đăng nhập...";
    okEl.style.display = "block";
    setTimeout(() => { window.location.href = "login.html"; }, 1500);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Đăng ký";
  }
});
</script>
</body>
</html>
